<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FuxiCTR Documentation</title>
  <script>
    // Semantic version comparison (e.g., v1.10 > v1.2)
    function compareVersions(a, b) {
      const parse = v => v.replace(/^v/, '').split('.').map(Number);
      const va = parse(a), vb = parse(b);
      const len = Math.max(va.length, vb.length);
      for (let i = 0; i < len; i++) {
        const na = va[i] || 0, nb = vb[i] || 0;
        if (na !== nb) return na - nb;
      }
      return 0;
    }

    function extractDirs(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const dirs = [];
      for (const a of doc.querySelectorAll('a')) {
        const href = (a.getAttribute('href') || '').replace(/\/$/, '');
        if (href === 'latest' || /^v\d+(\.\d+)*$/.test(href)) dirs.push(href);
      }
      return dirs;
    }

    function redirectToTarget(dirs) {
      if (!dirs.length) throw new Error('No version directories found');
      if (dirs.includes('latest')) {
        location.replace('./latest/');
        return;
      }
      const versions = dirs.filter(d => /^v\d+/.test(d));
      if (!versions.length) throw new Error('No version directories found');
      versions.sort(compareVersions);
      location.replace('./' + versions[versions.length - 1] + '/');
    }

    // Try directory listing first (works on local dev servers with autoindex),
    // then fall back to GitHub API (works on GitHub Pages).
    fetch('./')
      .then(r => r.ok ? r.text() : Promise.reject(new Error('Directory listing unavailable')))
      .then(html => {
        const dirs = extractDirs(html);
        if (dirs.length) redirectToTarget(dirs);
        else throw new Error('No versions found in directory listing');
      })
      .catch(err => {
        console.log('Directory listing failed, trying GitHub API:', err);
        return fetch('https://api.github.com/repos/fuxictr/fuxictr.github.io/contents/')
          .then(r => r.ok ? r.json() : Promise.reject(new Error('GitHub API error: ' + r.status)))
          .then(data => {
            const dirs = (data || [])
              .filter(item => item.type === 'dir' && (item.name === 'latest' || /^v\d+(\.\d+)*$/.test(item.name)))
              .map(item => item.name);
            redirectToTarget(dirs);
          });
      })
      .catch(err => {
        console.error('Failed to find latest version:', err);
        document.body.innerHTML = '<h1>Error</h1><p>Failed to detect the latest version automatically. Please navigate manually.</p>';
      });
  </script>
</head>
<body>
  <p>Redirecting to the latest version...</p>
</body>
</html>
